<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 WASD 简约增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #181818;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            color: #fff;
        }
        .title {
            font-size: 28px;
            margin-bottom: 15px;
            color: #4cd964;
        }
        .score-box {
            font-size: 22px;
            margin-bottom: 12px;
            color: #f1f1f1;
        }
        #gameCanvas {
            border: 3px solid #4cd964;
            border-radius: 6px;
            background: #000;
            box-shadow: 0 0 15px #27ae6050;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background: #4cd964;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #restartBtn:hover {
            background: #2ecc71;
        }
        .tip {
            margin-top: 15px;
            color: #999;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="title">贪吃蛇小游戏</div>
    <div class="score-box">当前得分：<span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="restartBtn">重新开始游戏</button>
    <div class="tip">操作：W 上  A 左  S 下  D 右</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');

        const grid = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;
        let score = 0;
        let gameOver = false;
        let gameTimer;

        document.addEventListener('keydown', changeDir);
        restartBtn.onclick = resetGame;

        startGame();

        function startGame(){
            gameTimer = setInterval(gameLoop, 110);
        }

        function gameLoop(){
            if(gameOver) return;
            moveSnake();
            checkEat();
            checkCrash();
            draw();
        }

        function moveSnake(){
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
        }

        function checkEat(){
            if(snake[0].x === food.x && snake[0].y === food.y){
                score += 10;
                scoreText.innerText = score;
                randFood();
            }else{
                snake.pop();
            }
        }

        function checkCrash(){
            let head = snake[0];
            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20){
                endGame();
            }
            for(let i = 1; i < snake.length; i++){
                if(snake[i].x === head.x && snake[i].y === head.y){
                    endGame();
                }
            }
        }

        function endGame(){
            gameOver = true;
            clearInterval(gameTimer);
            restartBtn.style.display = 'block';
        }

        function randFood(){
            food.x = Math.floor(Math.random() * 20);
            food.y = Math.floor(Math.random() * 20);
            snake.forEach(p=>{
                if(p.x === food.x && p.y === food.y) randFood();
            });
        }

        function draw(){
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 画蛇 修复颜色引号问题
            snake.forEach((p, idx)=>{
                if(idx === 0){
                    ctx.fillStyle = '#7fff7f';
                }else{
                    ctx.fillStyle = '#4cd964';
                }
                ctx.fillRect(p.x*grid, p.y*grid, grid-2, grid-2);
            });

            // 画食物
            ctx.fillStyle = '#ff5555';
            ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

            if(gameOver){
                ctx.fillStyle = '#fff';
                ctx.font = '32px 微软雅黑';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '20px 微软雅黑';
                ctx.fillText('最终得分：' + score, canvas.width/2, canvas.height/2 + 15);
            }
        }

        function changeDir(e){
            const w = 87, a = 65, s = 83, d = 68;
            let key = e.keyCode;

            if(key === w && dy !== 1){
                dx = 0; dy = -1;
            }
            if(key === s && dy !== -1){
                dx = 0; dy = 1;
            }
            if(key === a && dx !== 1){
                dx = -1; dy = 0;
            }
            if(key === d && dx !== -1){
                dx = 1; dy = 0;
            }
        }

        function resetGame(){
            snake = [{x:10,y:10}];
            dx = 0; dy = 0;
            score = 0;
            scoreText.innerText = 0;
            gameOver = false;
            restartBtn.style.display = 'none';
            randFood();
            startGame();
        }
    </script>
</body>
</html>
